name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint and SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lua SAST scan
        run: bash tests/security/test_sast_lua.sh

      - name: Secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""

  test-lua:
    name: Lua Tests
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: openresty/openresty:1.25.3.2-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install busted
        run: |
          apk add --no-cache lua5.1-dev luarocks
          luarocks install busted
          luarocks install dkjson
      - name: Run tests
        run: cd tests/lua && busted --verbose .

  test-java:
    name: Java Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: aria-runtime
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.12
      - name: Build and Test
        run: ./gradlew build test --no-daemon
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: aria-runtime/build/reports/tests/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-lua, test-java]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build JAR
        working-directory: aria-runtime
        run: |
          gradle wrapper --gradle-version 8.12
          ./gradlew bootJar --no-daemon
      - name: Build image
        run: docker build -t aria-runtime:ci aria-runtime/
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aria-runtime:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: aria-runtime/Dockerfile

  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build JAR
        working-directory: aria-runtime
        run: |
          gradle wrapper --gradle-version 8.12
          ./gradlew bootJar --no-daemon
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: aria-runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aria-runtime:${{ github.sha }}
            ghcr.io/${{ github.repository }}/aria-runtime:latest
