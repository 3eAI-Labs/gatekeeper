name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # TruffleHog needs full history for diff scans.

      - name: Lua SAST scan
        run: bash tests/security/test_sast_lua.sh

      # TruffleHog: full-repo scan on push events (no base/head diff available),
      # PR-diff scan on pull_request events.
      - name: Secret detection (TruffleHog) — push
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Secret detection (TruffleHog) — PR
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  test-lua:
    name: Lua Tests
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: openresty/openresty:1.25.3.2-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install busted
        run: |
          # Alpine ships luarocks as version-suffixed binaries; pin to 5.1 to
          # match the lua5.1-dev we install alongside it.
          apk add --no-cache lua5.1-dev luarocks5.1 build-base
          luarocks-5.1 install busted
          luarocks-5.1 install dkjson
      - name: Run tests
        # Our Lua tests use the "test_*.lua" naming convention; busted defaults
        # to "*_spec.lua", so pass an explicit pattern.
        run: cd tests/lua && busted --verbose --pattern=^test_ .

  # NOTE: The Aria Runtime (Java sidecar) lives in the private
  # 3eai-labs/aria-runtime repository. Its build / test / container image
  # are produced by that repository's CI; this public repository only covers
  # the Apache 2.0 Lua plugins, deployment assets, and documentation.
