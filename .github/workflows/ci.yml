name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and SAST
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # TruffleHog needs full history for diff scans.

      - name: Lua SAST scan
        run: bash tests/security/test_sast_lua.sh

      - name: Secret detection (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ env.DEFAULT_BRANCH }}
          head: HEAD
          extra_args: --only-verified

  test-lua:
    name: Lua Tests
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: openresty/openresty:1.25.3.2-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install busted
        run: |
          apk add --no-cache lua5.1-dev luarocks
          luarocks install busted
          luarocks install dkjson
      - name: Run tests
        run: cd tests/lua && busted --verbose .

  # NOTE: The Aria Runtime (Java sidecar) lives in the private
  # 3eai-labs/aria-runtime repository. Its build / test / container image
  # are produced by that repository's CI; this public repository only covers
  # the Apache 2.0 Lua plugins, deployment assets, and documentation.
