#
# APISIX routes for 3e-Aria-Gatekeeper (standalone / YAML config mode).
#
# Replace the example routes below with your own. APISIX 3.x requires the
# "#END" marker at the bottom of this file.
#
# Reference: https://apisix.apache.org/docs/apisix/deployment-modes/#standalone
#

routes:
  # Smoke-test route — echoes a JSON body without calling any upstream.
  - uri: /health/echo
    plugins:
      echo:
        body: '{"ok":true,"gateway":"3e-aria-gatekeeper"}'
    upstream:
      type: roundrobin
      nodes:
        "127.0.0.1:80": 1

  # End-to-end LLM proxy using a local Ollama model (1B llama3.2 by default).
  # Applications send OpenAI-compatible /v1/chat/completions payloads; aria-shield
  # validates, enforces quota, handles failover, and forwards to Ollama.
  - uri: /v1/chat/completions
    plugins:
      aria-shield:
        provider: ollama
        provider_config:
          endpoint: "http://ollama:11434/v1/chat/completions"
        quota:
          enabled: false
        prompt_security:
          enabled: true
          mode: regex_only
    upstream:
      type: roundrobin
      nodes:
        "ollama:11434": 1

#END
